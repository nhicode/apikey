<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHISATO KEY SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 40px 30px; border-radius: 12px; border-top: 4px solid #ff0055; box-shadow: 0 10px 30px rgba(255, 0, 85, 0.15); text-align: center; width: 90%; max-width: 420px; }
        h2 { margin-top: 0; color: #fff; letter-spacing: 1px; }
        .uid-text { font-size: 12px; color: #666; margin-bottom: 25px; word-break: break-all; }
        .key-display { background: #000; color: #ff0055; font-size: 22px; font-weight: bold; padding: 15px; border: 1px solid #333; border-radius: 8px; letter-spacing: 2px; margin: 20px 0; word-break: break-all; }
        .btn-copy { background: #ff0055; color: #fff; border: none; padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; width: 100%; text-transform: uppercase; }
        .btn-copy:hover { background: #cc0044; transform: scale(0.98); }
        .warning { color: #aaa; font-size: 13px; margin-top: 15px; }
        .error-msg { color: #ff3333; font-weight: bold; font-size: 18px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="box">
    <h2>CHISATO SYSTEM</h2>
    <div class="uid-text" id="uid-info">Đang tải thiết bị...</div>
    <div id="content">
        <p style="color: #ff0055;">Đang xác thực bảo mật...</p>
    </div>
</div>

<script>
    // 1. Kết nối Firebase
    const firebaseConfig = {
        databaseURL: "https://apikey-b4435-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. Lấy UID từ Tweak truyền qua Link
    const uid = new URLSearchParams(window.location.search).get('uid');
    const contentDiv = document.getElementById('content');

    if (!uid) {
        document.getElementById('uid-info').innerText = "KHÔNG TÌM THẤY THIẾT BỊ";
        contentDiv.innerHTML = '<p class="error-msg">TRUY CẬP KHÔNG HỢP LỆ!<br>Vui lòng mở từ App.</p>';
    } else {
        document.getElementById('uid-info').innerText = "UID: " + uid;
        processKeySystem();
    }

    async function processKeySystem() {
        const ref = db.ref('keys/' + uid);
        const snap = await ref.once('value');
        const data = snap.val();
        const now = Date.now();

        // Check Session Cache (Anti-Reload nghiêm ngặt)
        const isTabLocked = sessionStorage.getItem('chisato_tab_locked');

        // TRƯỜNG HỢP 1: Đã có Key và còn hạn (Dù F5 1000 lần vẫn chỉ hiện Key này)
        if (data && data.key && data.expires_at > now) {
            sessionStorage.setItem('chisato_tab_locked', 'true'); // Đánh dấu tab này đã xử lý
            renderUI(data.key, data.expires_at, "KEY CỦA BẠN ĐANG HOẠT ĐỘNG");
            return;
        }

        // TRƯỜNG HỢP 2: Key hết hạn hoặc chưa có Key
        // CHỐNG CHEAT: Nếu tab này đã xử lý rồi mà cố tình F5 khi hết key -> Khóa màn hình
        if (isTabLocked) {
            contentDiv.innerHTML = `
                <p class="error-msg">PHÁT HIỆN TẢI LẠI TRANG KHI HẾT HẠN!</p>
                <p style="color:#aaa; font-size:14px;">Bảo mật nghiêm ngặt: Bạn phải <b>ĐÓNG HOÀN TOÀN TAB NÀY</b>, sau đó vào lại App và lấy link mới để tạo Key.</p>
            `;
            return;
        }

        // TRƯỜNG HỢP 3: Hợp lệ để tạo Key mới (Key cũ đã hết 3 ngày hoặc máy mới tinh)
        const randomStr = Math.random().toString(36).substring(2, 9).toUpperCase();
        const newKey = "CHISATO_" + randomStr;
        const expireTime = now + (3 * 24 * 60 * 60 * 1000); // Chính xác 3 ngày (72h)

        // Ghi đè vào đúng UID của máy đó trên Firebase
        await ref.set({
            key: newKey,
            expires_at: expireTime,
            status: "active"
        });

        // Khóa tab ngay lập tức sau khi tạo để cấm F5 spam
        sessionStorage.setItem('chisato_tab_locked', 'true'); 
        
        renderUI(newKey, expireTime, "ĐÃ TẠO KEY MỚI THÀNH CÔNG");
    }

    // Hàm hiển thị giao diện
    function renderUI(key, expires_at, msg) {
        const dateObj = new Date(expires_at);
        const dateStr = dateObj.toLocaleDateString('vi-VN') + " " + dateObj.toLocaleTimeString('vi-VN');
        
        contentDiv.innerHTML = `
            <p style="color: #00ff66; font-weight: bold; font-size: 14px;">${msg}</p>
            <div class="key-display" id="keyText">${key}</div>
            <button class="btn-copy" onclick="copyMyKey('${key}')">SAO CHÉP KEY</button>
            <p class="warning">Sẽ tự động hết hạn và xóa sau:<br><strong style="color:#fff;">${dateStr}</strong></p>
        `;
    }

    // Hàm Copy
    function copyMyKey(k) {
        navigator.clipboard.writeText(k).then(() => {
            const btn = document.querySelector('.btn-copy');
            btn.innerText = "ĐÃ SAO CHÉP!";
            btn.style.background = "#00cc44";
            setTimeout(() => { 
                btn.innerText = "SAO CHÉP KEY"; 
                btn.style.background = "#ff0055"; 
            }, 2000);
        });
    }
</script>

</body>
</html>
