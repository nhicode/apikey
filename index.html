<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chisato — Lấy mã truy cập</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* ── TOKENS ────────────────────────────── */
        :root {
            --red:     #ff0055;
            --red-dk:  #c40042;
            --green:   #00ff99;
            --orange:  #ff9900;
            --bg:      #07070c;
            --card:    rgba(15, 15, 22, 0.93);
            --border:  rgba(255, 0, 85, 0.16);
            --muted:   rgba(255,255,255,0.32);
            --r:       20px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── AMBIENT BACKGROUND ───────────────── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(255,0,85,.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,0,85,.035) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none;
        }
        .glow-tr, .glow-bl {
            position: fixed; border-radius: 50%;
            filter: blur(90px); pointer-events: none; z-index: 0;
        }
        .glow-tr { width: 340px; height: 340px; top: -80px; right: -80px;
            background: rgba(255,0,85,.11); }
        .glow-bl { width: 280px; height: 280px; bottom: -70px; left: -70px;
            background: rgba(110,0,255,.08); }

        /* ── CARD ─────────────────────────────── */
        .card {
            position: relative; z-index: 1;
            background: var(--card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 34px 26px 28px;
            width: 92%; max-width: 400px;
            box-shadow: 0 28px 70px rgba(0,0,0,.65),
                        0 0 0 .5px rgba(255,255,255,.04) inset;
            opacity: 0;
            transform: translateY(18px) scale(.975);
            animation: rise .6s cubic-bezier(.16,1,.3,1) .08s forwards;
        }

        @keyframes rise { to { opacity: 1; transform: none; } }

        /* ── HEADER ───────────────────────────── */
        .hd { text-align: center; margin-bottom: 22px; }
        .hd-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 52px; height: 52px;
            background: linear-gradient(145deg, rgba(255,0,85,.22), rgba(200,0,60,.1));
            border: 1px solid rgba(255,0,85,.28);
            border-radius: 15px; font-size: 22px;
            box-shadow: 0 4px 18px rgba(255,0,85,.18);
            margin-bottom: 13px;
        }
        .hd-name {
            font-size: 19px; font-weight: 800; letter-spacing: 3.5px;
            text-transform: uppercase;
            background: linear-gradient(100deg, #ff0055 10%, #ff5500 90%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hd-tagline {
            margin-top: 4px; font-size: 11px; font-weight: 500;
            letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
        }

        /* ── DIVIDER ──────────────────────────── */
        .sep {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,0,85,.22), transparent);
            margin: 18px 0;
        }

        /* ── STATUS PILL ──────────────────────── */
        .pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 11px; border-radius: 40px;
            font-size: 10px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; margin-bottom: 13px;
        }
        .pill.ok  { background: rgba(0,255,153,.1); border: 1px solid rgba(0,255,153,.28); color: var(--green); }
        .pill.new { background: rgba(255,153,0,.1);  border: 1px solid rgba(255,153,0,.28);  color: var(--orange); }
        .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor;
            animation: blink 1.4s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

        /* ── KEY BOX ──────────────────────────── */
        .key-box {
            background: rgba(0,0,0,.45);
            border: 1px solid rgba(255,0,85,.2);
            border-radius: 15px;
            padding: 18px 16px 15px;
            margin: 4px 0 18px;
            position: relative; overflow: hidden;
        }
        .key-box::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,0,85,.45), transparent);
        }
        .key-lbl {
            font-size: 9px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: var(--muted); margin-bottom: 9px;
        }
        .key-val {
            font-size: 20px; font-weight: 800; color: var(--red);
            letter-spacing: 2px; word-break: break-all;
            animation: kglow 2.5s ease-in-out infinite alternate;
        }
        @keyframes kglow {
            from { text-shadow: 0 0 8px rgba(255,0,85,.4); }
            to   { text-shadow: 0 0 24px rgba(255,0,85,.9), 0 0 55px rgba(255,0,85,.22); }
        }

        /* ── COUNTDOWN ROW ────────────────────── */
        .cd-row {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 11px; margin-top: 11px;
            border-top: 1px solid rgba(255,255,255,.05);
        }
        .cd-lbl  { font-size: 11px; color: var(--muted); }
        .cd-val  { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; color: #fff; }
        .cd-val.warn { color: var(--orange); }
        .cd-val.crit { color: #ff4444; }

        /* ── MAIN BUTTON ──────────────────────── */
        .btn {
            display: block; width: 100%;
            padding: 15px; margin-top: 0;
            background: linear-gradient(90deg, var(--red), var(--red-dk));
            color: #fff; border: none; border-radius: 13px;
            font-size: 13px; font-weight: 800; letter-spacing: 1.2px;
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,0,85,.32);
            position: relative; overflow: hidden;
            transition: transform .22s cubic-bezier(.16,1,.3,1), box-shadow .22s, opacity .22s;
        }
        .btn::before {
            content: ''; position: absolute;
            top: 0; left: -110%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.13), transparent);
            transition: left .45s ease;
        }
        .btn:not(:disabled):hover::before { left: 110%; }
        .btn:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,0,85,.48); }
        .btn:not(:disabled):active { transform: translateY(1px); }
        .btn:disabled { opacity: .55; cursor: default; }

        .btn.copied { background: linear-gradient(90deg, #00cc7a, #009e5e);
            box-shadow: 0 4px 20px rgba(0,204,122,.3); }

        .btn.wait { background: linear-gradient(90deg, #333, #222); box-shadow: none; }

        /* ── GHOST BUTTON ─────────────────────── */
        .btn-ghost {
            display: block; width: 100%;
            padding: 12px; margin-top: 10px;
            background: transparent;
            color: var(--muted); border: 1px solid rgba(255,255,255,.1);
            border-radius: 13px;
            font-size: 12px; font-weight: 600; letter-spacing: .5px;
            cursor: pointer;
            transition: background .2s, border-color .2s, color .2s;
        }
        .btn-ghost:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.2); color: #fff; }

        /* ── LOADER ───────────────────────────── */
        .loader {
            display: flex; flex-direction: column; align-items: center;
            gap: 14px; padding: 28px 0 10px;
        }
        .ring {
            width: 40px; height: 40px;
            border: 2.5px solid rgba(255,0,85,.15);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin .72s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-txt { font-size: 12px; color: var(--muted); letter-spacing: .5px; }

        /* ── STATE SCREENS ────────────────────── */
        .state { text-align: center; padding: 10px 0 4px; }
        .state-ico { font-size: 38px; display: block; margin-bottom: 12px; }
        .state-ttl { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
        .state-ttl.expired { color: var(--orange); }
        .state-ttl.bad     { color: #ff4444; }
        .state-ttl.ok      { color: var(--green); }
        .state-ttl.warn    { color: var(--orange); }
        .state-desc { font-size: 13px; color: var(--muted); line-height: 1.8; }
        .state-desc b { color: rgba(255,255,255,.75); font-weight: 700; }
        .state-desc .hl { color: var(--orange); font-weight: 700; }

        /* ── BYPASS BUTTONS ───────────────────── */
        .bypass-hd { text-align: center; margin-bottom: 16px; }
        .bypass-hd p:first-child {
            font-size: 15px; font-weight: 700; margin-bottom: 6px; color: #fff;
        }
        .bypass-hd p:last-child { font-size: 12px; color: var(--muted); line-height: 1.6; }
        .bypass-hd b { color: rgba(255,255,255,.8); }

        .bypass-list { display: flex; flex-direction: column; gap: 9px; margin: 4px 0 14px; }

        .bypass-row {
            display: flex; align-items: center; gap: 12px;
            width: 100%; padding: 14px 15px;
            background: rgba(255,0,85,.06);
            border: 1px solid rgba(255,0,85,.16);
            border-radius: 13px;
            color: #fff; cursor: pointer; text-align: left;
            transition: background .2s, border-color .2s, transform .2s;
        }
        .bypass-row:hover {
            background: rgba(255,0,85,.13);
            border-color: rgba(255,0,85,.35);
            transform: translateX(3px);
        }
        .bypass-row:active { transform: translateX(1px); }

        .bypass-num {
            flex-shrink: 0;
            width: 28px; height: 28px;
            background: rgba(255,0,85,.2); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800; color: var(--red);
        }
        .bypass-lbl  { flex: 1; font-size: 13px; font-weight: 600; }
        .bypass-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .bypass-arr  { color: var(--muted); font-size: 14px; }

        .bypass-note { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.6; }

        /* ── EXPIRY NOTE ──────────────────────── */
        .exp-note {
            margin-top: 13px; font-size: 11px; color: var(--muted);
            text-align: center; line-height: 1.6;
        }
        .exp-note b { color: rgba(255,255,255,.4); }

        /* ── FOOTER ───────────────────────────── */
        .ft {
            margin-top: 20px; font-size: 10px;
            color: rgba(255,255,255,.09);
            text-align: center; letter-spacing: 1.5px; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="glow-tr"></div>
    <div class="glow-bl"></div>

    <div class="card">
        <div class="hd">
            <div class="hd-icon">🔑</div>
            <div class="hd-name">Chisato</div>
            <div class="hd-tagline">Access Key System</div>
        </div>
        <div class="sep"></div>

        <div id="content">
            <div class="loader">
                <div class="ring"></div>
                <p class="loader-txt">Đang kiểm tra thiết bị…</p>
            </div>
        </div>

        <div class="ft">Chisato System © 2025</div>
    </div>

<script>
/* ════════════════════════════════════════
   CẤU HÌNH — chỉnh sửa tại đây
   ════════════════════════════════════════ */

// Thay BASE_URL bằng domain bypass của bạn, ví dụ: 'https://loot.link/'
const BASE_URL = 'https://loot.link/';

const LINKS = [
    { id: 1, token: '686c94a4ea6afc1d963edcbe', label: 'Đường dẫn 1' },
    { id: 2, token: '686c954fd1626679a303f9e1', label: 'Đường dẫn 2' },
    { id: 3, token: '68a5bef8cf162d78244c6702', label: 'Đường dẫn 3' },
];

const MIN_WAIT_MS = 60 * 1000; // 60 giây tối thiểu

/* ════════════════════════════════════════
   FIREBASE
   ════════════════════════════════════════ */
const firebaseConfig = {
    databaseURL: 'https://apikey-b4435-default-rtdb.firebaseio.com/'
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const uid  = new URLSearchParams(window.location.search).get('uid');
const $c   = document.getElementById('content');
let _timer = null;

/* ════════════════════════════════════════
   ENTRY POINT
   ════════════════════════════════════════ */
if (!uid) {
    renderInvalid();
} else {
    init();
}

async function init() {
    try {
        // Đọc cả key và bypass record cùng lúc
        const [kSnap, bSnap] = await Promise.all([
            db.ref('keys/'   + uid).once('value'),
            db.ref('bypass/' + uid).once('value'),
        ]);

        const key    = kSnap.val();
        const bypass = bSnap.val();
        const now    = Date.now();

        /* ── Đã có key ──────────────────────────
           Dù copy link, tab mới, hay F5 — nếu UID
           đã tồn tại trong DB thì không bao giờ
           tạo key mới. Chỉ hiển thị trạng thái. */
        if (key && key.key) {
            if (key.expires_at > now) {
                showKey(key.key, key.expires_at, false);
            } else {
                showExpired();
            }
            return;
        }

        /* ── Đã click bypass trước đó ────────── */
        if (bypass && bypass.started) {
            showBypassPending(bypass.link_id, bypass.started);
            return;
        }

        /* ── Lần đầu, chưa có gì ─────────────── */
        showBypassNeeded();

    } catch (err) {
        showError();
    }
}

/* ════════════════════════════════════════
   ACTIONS
   ════════════════════════════════════════ */

// Người dùng bấm 1 trong 3 nút → ghi thời gian bắt đầu vào DB, mở link
async function startBypass(linkId) {
    try {
        const started = Date.now();
        // Lưu trước khi mở để tránh race condition
        await db.ref('bypass/' + uid).set({ started, link_id: linkId });

        const link = LINKS.find(l => l.id === linkId);
        window.open(BASE_URL + link.token, '_blank');

        showBypassPending(linkId, started);
    } catch (err) {
        showError();
    }
}

// Người dùng bấm xác nhận sau khi hoàn thành bypass
async function verifyBypass() {
    const verifyBtn = document.getElementById('verifyBtn');
    if (verifyBtn) { verifyBtn.disabled = true; verifyBtn.textContent = 'Đang kiểm tra…'; }

    try {
        const snap = await db.ref('bypass/' + uid).once('value');
        const data = snap.val();

        if (!data || !data.started) { showBypassNeeded(); return; }

        const elapsed = Date.now() - data.started;

        // Kiểm tra thời gian tối thiểu
        if (elapsed < MIN_WAIT_MS) {
            showTooFast(MIN_WAIT_MS - elapsed);
            return;
        }

        // Tạo key lần đầu và duy nhất
        const newKey    = 'CHISATO_' + Math.random().toString(36).substring(2, 9).toUpperCase();
        const expiresAt = Date.now() + 3 * 24 * 60 * 60 * 1000;

        await Promise.all([
            db.ref('keys/'   + uid).set({
                key:        newKey,
                expires_at: expiresAt,
                created_at: Date.now(),
                status:     'active',
            }),
            db.ref('bypass/' + uid).remove(),  // Dọn dẹp bản ghi bypass
        ]);

        showKey(newKey, expiresAt, true);

    } catch (err) {
        showError();
    }
}

// Người dùng muốn chọn đường dẫn khác
async function resetBypass() {
    try {
        await db.ref('bypass/' + uid).remove();
    } catch (_) {}
    showBypassNeeded();
}

/* ════════════════════════════════════════
   RENDER FUNCTIONS
   ════════════════════════════════════════ */

function showKey(key, expiresAt, isNew) {
    clearTick();
    const dtStr = new Date(expiresAt).toLocaleString('vi-VN');
    $c.innerHTML = `
        <div style="text-align:center">
            <span class="pill ${isNew ? 'new' : 'ok'}">
                <span class="pill-dot"></span>
                ${isNew ? 'Mã mới — đã tạo xong' : 'Đang hoạt động'}
            </span>
        </div>
        <div class="key-box">
            <p class="key-lbl">Mã truy cập của bạn</p>
            <div class="key-val">${key}</div>
            <div class="cd-row">
                <span class="cd-lbl">⏱ Còn lại</span>
                <span class="cd-val" id="cdv">--:--:--</span>
            </div>
        </div>
        <button class="btn" id="copyBtn" onclick="doCopy('${key}')">
            📋 &nbsp;Sao chép mã
        </button>
        <p class="exp-note">Hết hạn lúc: <b>${dtStr}</b></p>`;
    tickKey(expiresAt);
}

function showExpired() {
    clearTick();
    $c.innerHTML = `
        <div class="state">
            <span class="state-ico">🔒</span>
            <p class="state-ttl expired">Mã đã hết hạn</p>
            <p class="state-desc">
                Mã truy cập của bạn không còn hiệu lực rồi.<br>
                Mở <b>ứng dụng</b> và nhấn nút <span class="hl">Lấy key</span><br>
                để nhận mã mới nhé.
            </p>
        </div>`;
}

function showBypassNeeded() {
    clearTick();
    $c.innerHTML = `
        <div class="bypass-hd">
            <p>Chưa có mã truy cập</p>
            <p>Hoàn thành <b>1 trong 3</b> đường dẫn bên dưới<br>để tạo mã của bạn — chỉ cần làm 1 lần.</p>
        </div>
        <div class="bypass-list">
            ${LINKS.map(l => `
            <button class="bypass-row" onclick="startBypass(${l.id})">
                <span class="bypass-num">${l.id}</span>
                <div style="flex:1">
                    <div class="bypass-lbl">${l.label}</div>
                    <div class="bypass-sub">Nhấn để mở</div>
                </div>
                <span class="bypass-arr">→</span>
            </button>`).join('')}
        </div>
        <p class="bypass-note">Mỗi thiết bị chỉ tạo được 1 mã duy nhất.</p>`;
}

function showBypassPending(linkId, startedTime) {
    clearTick();
    const elapsed  = Date.now() - startedTime;
    const remMs    = Math.max(0, MIN_WAIT_MS - elapsed);
    const remSec   = Math.ceil(remMs / 1000);
    const canClick = remSec <= 0;

    $c.innerHTML = `
        <div class="state">
            <span class="state-ico">🌐</span>
            <p class="state-ttl ok">Đường dẫn ${linkId} đã mở</p>
            <p class="state-desc">
                Hoàn thành các bước trong tab vừa mở,<br>
                rồi quay lại đây bấm xác nhận.
            </p>
        </div>
        <button class="btn ${canClick ? '' : 'wait'}" id="verifyBtn"
            ${canClick ? '' : 'disabled'}
            onclick="verifyBypass()">
            ${canClick ? '✅ &nbsp;Xác nhận hoàn thành' : `Chờ <span id="vsec">${remSec}</span>s nữa…`}
        </button>
        <button class="btn-ghost" onclick="resetBypass()">← Chọn đường dẫn khác</button>`;

    if (!canClick) tickVerify(startedTime);
}

function showTooFast(remainingMs) {
    clearTick();
    const sec = Math.ceil(remainingMs / 1000);
    $c.innerHTML = `
        <div class="state">
            <span class="state-ico">⚡</span>
            <p class="state-ttl warn">Nhanh quá rồi!</p>
            <p class="state-desc">
                Bạn cần ở lại trang bypass ít nhất <b>1 phút</b>.<br>
                Hãy thử lại và hoàn thành đầy đủ các bước nhé.
            </p>
        </div>
        <button class="btn-ghost" onclick="resetBypass()">← Thử lại từ đầu</button>`;
}

function showInvalid() {
    $c.innerHTML = `
        <div class="state">
            <span class="state-ico">🚫</span>
            <p class="state-ttl bad">Không hợp lệ</p>
            <p class="state-desc">
                Đường dẫn này thiếu thông tin thiết bị.<br>
                Vui lòng mở lại từ <b>ứng dụng</b>.
            </p>
        </div>`;
}

function showError() {
    $c.innerHTML = `
        <div class="state">
            <span class="state-ico">⚠️</span>
            <p class="state-ttl bad">Lỗi kết nối</p>
            <p class="state-desc">
                Không thể kết nối máy chủ.<br>
                Kiểm tra mạng rồi thử lại nhé.
            </p>
        </div>
        <button class="btn-ghost" onclick="location.reload()">↺ Thử lại</button>`;
}

function renderInvalid() { showInvalid(); }

/* ════════════════════════════════════════
   TIMERS
   ════════════════════════════════════════ */

// Countdown trên nút Xác nhận
function tickVerify(startedTime) {
    if (_timer) clearInterval(_timer);
    _timer = setInterval(() => {
        const rem = MIN_WAIT_MS - (Date.now() - startedTime);
        const btn = document.getElementById('verifyBtn');
        const sec = document.getElementById('vsec');
        if (!btn) { clearInterval(_timer); return; }
        if (rem <= 0) {
            clearInterval(_timer);
            btn.disabled = false;
            btn.className = 'btn';
            btn.innerHTML = '✅ &nbsp;Xác nhận hoàn thành';
        } else if (sec) {
            sec.textContent = Math.ceil(rem / 1000);
        }
    }, 400);
}

// Countdown trên màn hình key
function tickKey(expiresAt) {
    if (_timer) clearInterval(_timer);
    const tick = () => {
        const r  = expiresAt - Date.now();
        const el = document.getElementById('cdv');
        if (!el) { clearInterval(_timer); return; }
        if (r <= 0) { clearInterval(_timer); showExpired(); return; }

        const d = Math.floor(r / 86400000);
        const h = Math.floor((r % 86400000) / 3600000);
        const m = Math.floor((r % 3600000)  / 60000);
        const s = Math.floor((r % 60000)    / 1000);

        el.textContent = d > 0
            ? `${d}n ${p2(h)}:${p2(m)}:${p2(s)}`
            : `${p2(h)}:${p2(m)}:${p2(s)}`;

        el.className = 'cd-val' + (r < 600000 ? ' crit' : r < 3600000 ? ' warn' : '');
    };
    tick();
    _timer = setInterval(tick, 1000);
}

function clearTick() {
    if (_timer) { clearInterval(_timer); _timer = null; }
}

function p2(n) { return String(n).padStart(2, '0'); }

/* ════════════════════════════════════════
   COPY
   ════════════════════════════════════════ */
function doCopy(key) {
    const flash = () => {
        const btn = document.getElementById('copyBtn');
        if (!btn) return;
        btn.innerHTML = '✅ &nbsp;Đã sao chép!';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.innerHTML = '📋 &nbsp;Sao chép mã';
            btn.classList.remove('copied');
        }, 2200);
    };
    if (navigator.clipboard) {
        navigator.clipboard.writeText(key).then(flash).catch(() => fallback(key, flash));
    } else {
        fallback(key, flash);
    }
}
function fallback(key, cb) {
    const ta = Object.assign(document.createElement('textarea'),
        { value: key, style: 'position:fixed;left:-9999px' });
    document.body.append(ta); ta.select();
    try { document.execCommand('copy'); cb(); } catch (_) {}
    ta.remove();
}
