<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHISATO — Key Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --red:      #ff0055;
            --red-dark: #c40042;
            --red-dim:  rgba(255, 0, 85, 0.18);
            --green:    #00ff99;
            --orange:   #ff9900;
            --bg:       #07070c;
            --surface:  rgba(16, 16, 24, 0.92);
            --border:   rgba(255, 0, 85, 0.18);
            --sub:      rgba(255,255,255,0.35);
            --radius:   22px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* === BACKGROUND === */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(255,0,85,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,0,85,.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }
        .bg-glow {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 60% 50% at 80% 10%, rgba(255,0,85,.13) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 10% 90%, rgba(140,0,255,.09) 0%, transparent 70%);
            pointer-events: none;
        }

        /* === CARD === */
        .card {
            position: relative; z-index: 1;
            background: var(--surface);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 28px 30px;
            width: 92%; max-width: 400px;
            box-shadow:
                0 32px 72px rgba(0,0,0,.6),
                0 0 0 0.5px rgba(255,255,255,.04) inset,
                0 0 50px rgba(255,0,85,.06);
            opacity: 0;
            transform: translateY(20px) scale(.98);
            animation: cardIn .65s cubic-bezier(.16,1,.3,1) .05s forwards;
        }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* === HEADER === */
        .header { text-align: center; margin-bottom: 24px; }

        .logo {
            display: inline-flex; align-items: center; justify-content: center;
            width: 54px; height: 54px;
            background: linear-gradient(145deg, rgba(255,0,85,.25), rgba(200,0,60,.1));
            border: 1px solid rgba(255,0,85,.3);
            border-radius: 16px;
            font-size: 24px;
            margin-bottom: 14px;
            box-shadow: 0 4px 20px rgba(255,0,85,.2);
        }

        .brand {
            font-size: 20px; font-weight: 900;
            letter-spacing: 4px; text-transform: uppercase;
            background: linear-gradient(100deg, #ff0055 0%, #ff5500 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-sub {
            margin-top: 5px;
            font-size: 10px; font-weight: 600;
            letter-spacing: 2.5px; text-transform: uppercase;
            color: var(--sub);
        }

        /* === DIVIDER === */
        .line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,0,85,.25), transparent);
            margin: 20px 0;
        }

        /* === STATUS PILL === */
        .pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }
        .pill.ok   { background: rgba(0,255,153,.1); border: 1px solid rgba(0,255,153,.3); color: var(--green); }
        .pill.new  { background: rgba(255,153,0,.1);  border: 1px solid rgba(255,153,0,.3);  color: var(--orange); }
        .pill-dot  { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: blink 1.4s ease-in-out infinite; }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

        /* === KEY BOX === */
        .key-box {
            background: rgba(0,0,0,.5);
            border: 1px solid rgba(255,0,85,.22);
            border-radius: 16px;
            padding: 18px 16px 16px;
            margin: 4px 0 18px;
            position: relative; overflow: hidden;
        }
        .key-box::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,0,85,.5), transparent);
        }

        .key-lbl {
            font-size: 9px; font-weight: 700;
            letter-spacing: 2.5px; text-transform: uppercase;
            color: var(--sub); margin-bottom: 10px;
        }

        .key-val {
            font-size: 21px; font-weight: 800;
            color: var(--red); letter-spacing: 2px;
            word-break: break-all;
            animation: glow 2.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(255,0,85,.4); }
            to   { text-shadow: 0 0 28px rgba(255,0,85,.9), 0 0 60px rgba(255,0,85,.25); }
        }

        /* === COUNTDOWN === */
        .countdown-row {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 12px; margin-top: 12px;
            border-top: 1px solid rgba(255,255,255,.05);
        }
        .countdown-label { font-size: 11px; color: var(--sub); }
        .countdown-val   { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; color: #fff; }
        .countdown-val.warn  { color: var(--orange); }
        .countdown-val.crit  { color: #ff4444; }

        /* === BUTTON === */
        .btn {
            display: block; width: 100%;
            padding: 15px 20px;
            background: linear-gradient(90deg, var(--red) 0%, var(--red-dark) 100%);
            color: #fff;
            border: none; border-radius: 14px;
            font-size: 13px; font-weight: 800; letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 22px rgba(255,0,85,.35);
            position: relative; overflow: hidden;
            transition: transform .25s cubic-bezier(.16,1,.3,1), box-shadow .25s;
        }

        .btn::before {
            content: '';
            position: absolute; top: 0; left: -110%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.14), transparent);
            transition: left .5s ease;
        }
        .btn:hover::before { left: 110%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,0,85,.5); }
        .btn:active { transform: translateY(1px); }

        .btn.done {
            background: linear-gradient(90deg, #00cc7a, #00a362);
            box-shadow: 0 4px 22px rgba(0,255,153,.3);
        }

        /* === LOADER === */
        .loader-wrap {
            display: flex; flex-direction: column; align-items: center; gap: 14px;
            padding: 24px 0 8px;
        }

        .ring {
            width: 42px; height: 42px;
            border: 3px solid rgba(255,0,85,.15);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin .75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text { font-size: 12px; color: var(--sub); letter-spacing: 1px; }

        /* === STATE SCREENS === */
        .state { text-align: center; padding: 16px 0 6px; }
        .state-icon { font-size: 42px; margin-bottom: 14px; display: block; }
        .state-title { font-size: 16px; font-weight: 800; margin-bottom: 8px; letter-spacing: .5px; }
        .state-title.expired { color: var(--orange); }
        .state-title.invalid { color: #ff4444; }
        .state-desc  { font-size: 13px; color: var(--sub); line-height: 1.75; }
        .state-desc strong { color: rgba(255,255,255,.75); }

        /* === EXPIRY LINE === */
        .expiry-note {
            margin-top: 14px;
            font-size: 11px; color: var(--sub); text-align: center; line-height: 1.7;
        }
        .expiry-note strong { color: rgba(255,255,255,.45); }

        /* === FOOTER === */
        .footer {
            margin-top: 22px;
            font-size: 10px; color: rgba(255,255,255,.1);
            text-align: center; letter-spacing: 1.5px; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="card">
        <!-- Header -->
        <div class="header">
            <div class="logo">🔑</div>
            <div class="brand">CHISATO</div>
            <div class="brand-sub">Access Key System</div>
        </div>

        <div class="line"></div>

        <!-- Dynamic content area -->
        <div id="content">
            <div class="loader-wrap">
                <div class="ring"></div>
                <p class="loader-text">Đang xác thực thiết bị…</p>
            </div>
        </div>

        <div class="footer">CHISATO SYSTEM &copy; 2025</div>
    </div>

<script>
/* ───────────────────────────────
   FIREBASE CONFIG
─────────────────────────────── */
const firebaseConfig = {
    databaseURL: "https://apikey-b4435-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const uid = new URLSearchParams(window.location.search).get('uid');
const $content = document.getElementById('content');
let _timer = null;

/* ───────────────────────────────
   ENTRY POINT
─────────────────────────────── */
if (!uid) {
    renderInvalid();
} else {
    run();
}

async function run() {
    try {
        const ref  = db.ref('keys/' + uid);
        const snap = await ref.once('value');
        const data = snap.val();
        const now  = Date.now();

        /*
         * ✅ KEY ĐÃ TỒN TẠI TRONG DB (dù còn hạn hay hết hạn)
         *    → KHÔNG BAO GIỜ tạo mới, chỉ hiển thị trạng thái.
         *    → Copy link, mở tab mới, F5 đều ra kết quả y hệt.
         */
        if (data && data.key) {
            if (data.expires_at > now) {
                renderKey(data.key, data.expires_at, false);   // Còn hạn
            } else {
                renderExpired();                                 // Hết hạn
            }
            return;
        }

        /*
         * 🆕 UID NÀY CHƯA CÓ KEY
         *    → Tạo key MỘT LẦN DUY NHẤT, lưu vào DB.
         */
        const rand      = Math.random().toString(36).substring(2, 9).toUpperCase();
        const newKey    = 'CHISATO_' + rand;
        const expiresAt = now + 3 * 24 * 60 * 60 * 1000; // +3 ngày

        await ref.set({
            key:        newKey,
            expires_at: expiresAt,
            created_at: now,
            status:     'active'
        });

        renderKey(newKey, expiresAt, true);

    } catch (err) {
        $content.innerHTML = `
            <div class="state">
                <span class="state-icon">⚠️</span>
                <p class="state-title invalid">LỖI KẾT NỐI</p>
                <p class="state-desc">Không thể kết nối máy chủ.<br>Vui lòng thử lại sau.</p>
            </div>`;
    }
}

/* ───────────────────────────────
   RENDER: KEY CÒN HẠN
─────────────────────────────── */
function renderKey(key, expiresAt, isNew) {
    const pillClass = isNew ? 'new' : 'ok';
    const pillText  = isNew ? 'KEY MỚI' : 'ĐANG HOẠT ĐỘNG';
    const dateStr   = new Date(expiresAt).toLocaleString('vi-VN');

    $content.innerHTML = `
        <div style="text-align:center">
            <span class="pill ${pillClass}">
                <span class="pill-dot"></span>${pillText}
            </span>
        </div>

        <div class="key-box">
            <p class="key-lbl">Mã truy cập của bạn</p>
            <div class="key-val" id="keyVal">${key}</div>
            <div class="countdown-row">
                <span class="countdown-label">⏱ Hết hạn sau</span>
                <span class="countdown-val" id="cdv">--:--:--</span>
            </div>
        </div>

        <button class="btn" id="copyBtn" onclick="copyKey('${key}')">
            📋 &nbsp; Sao chép mã
        </button>

        <p class="expiry-note">
            Tự động hủy lúc: <strong>${dateStr}</strong>
        </p>`;

    startCountdown(expiresAt);
}

/* ───────────────────────────────
   RENDER: HẾT HẠN
─────────────────────────────── */
function renderExpired() {
    $content.innerHTML = `
        <div class="state">
            <span class="state-icon">🔒</span>
            <p class="state-title expired">KEY ĐÃ HẾT HẠN</p>
            <p class="state-desc">
                Mã truy cập của bạn đã hết hiệu lực.<br>
                Vui lòng mở <strong>ứng dụng</strong> và nhấn<br>
                nút <strong style="color:var(--orange)">GET KEY</strong> để nhận mã mới.
            </p>
        </div>`;
}

/* ───────────────────────────────
   RENDER: KHÔNG HỢP LỆ (không có UID)
─────────────────────────────── */
function renderInvalid() {
    $content.innerHTML = `
        <div class="state">
            <span class="state-icon">🚫</span>
            <p class="state-title invalid">TRUY CẬP KHÔNG HỢP LỆ</p>
            <p class="state-desc">
                Đường dẫn không chứa thiết bị hợp lệ.<br>
                Vui lòng khởi động lại từ <strong>ứng dụng</strong>.
            </p>
        </div>`;
}

/* ───────────────────────────────
   COUNTDOWN
─────────────────────────────── */
function startCountdown(expiresAt) {
    if (_timer) clearInterval(_timer);

    function tick() {
        const remaining = expiresAt - Date.now();
        const el = document.getElementById('cdv');
        if (!el) { clearInterval(_timer); return; }

        if (remaining <= 0) {
            clearInterval(_timer);
            renderExpired();
            return;
        }

        const d = Math.floor(remaining / 86400000);
        const h = Math.floor((remaining % 86400000) / 3600000);
        const m = Math.floor((remaining % 3600000)  / 60000);
        const s = Math.floor((remaining % 60000)    / 1000);

        el.textContent = d > 0
            ? `${d}n ${pad(h)}:${pad(m)}:${pad(s)}`
            : `${pad(h)}:${pad(m)}:${pad(s)}`;

        // Đổi màu cảnh báo
        el.className = 'countdown-val' +
            (remaining < 600000  ? ' crit' :
             remaining < 3600000 ? ' warn' : '');
    }

    tick();
    _timer = setInterval(tick, 1000);
}

function pad(n) { return String(n).padStart(2, '0'); }

/* ───────────────────────────────
   COPY KEY
─────────────────────────────── */
function copyKey(key) {
    const doMark = () => {
        const btn = document.getElementById('copyBtn');
        if (!btn) return;
        btn.innerHTML = '✅ &nbsp; Đã sao chép!';
        btn.classList.add('done');
        setTimeout(() => {
            btn.innerHTML = '📋 &nbsp; Sao chép mã';
            btn.classList.remove('done');
        }, 2200);
    };

    if (navigator.clipboard) {
        navigator.clipboard.writeText(key).then(doMark).catch(() => fallbackCopy(key, doMark));
    } else {
        fallbackCopy(key, doMark);
    }
}

function fallbackCopy(key, cb) {
    const ta = document.createElement('textarea');
    ta.value = key;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); cb(); } catch(e) {}
    document.body.removeChild(ta);
}
</script>
</body>
</html>
