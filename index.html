<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHISATO SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: linear-gradient(135deg, #070708 0%, #14020a 100%); 
            color: #fff; 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        .box { 
            background: rgba(18, 18, 24, 0.85); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 0, 85, 0.2); 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 0, 85, 0.1); 
            text-align: center; 
            width: 90%; 
            max-width: 400px; 
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInMenu 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h2 { 
            font-size: 24px;
            font-weight: 800;
            color: #fff; 
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ff0055, #ff5500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .key-display { 
            background: rgba(0, 0, 0, 0.4); 
            color: #ff0055; 
            font-size: 24px; 
            font-weight: 700; 
            padding: 18px; 
            border: 1px solid rgba(255, 0, 85, 0.3); 
            border-radius: 14px; 
            letter-spacing: 2px; 
            margin: 25px 0; 
            word-break: break-all; 
            text-shadow: 0 0 12px rgba(255, 0, 85, 0.6);
            box-shadow: inset 0 0 15px rgba(255, 0, 85, 0.1);
            animation: pulseGlow 2s infinite alternate;
        }

        .btn-copy { 
            background: linear-gradient(90deg, #ff0055 0%, #d60048 100%); 
            color: #fff; 
            border: none; 
            padding: 15px 25px; 
            font-size: 15px; 
            font-weight: 700; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
            width: 100%; 
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3);
        }

        .btn-copy:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 85, 0.5);
        }

        .btn-copy:active {
            transform: translateY(1px);
        }

        .warning { 
            color: #666; 
            font-size: 12px; 
            margin-top: 20px; 
            line-height: 1.5;
        }

        .error-msg { 
            color: #ff4444; 
            font-weight: 600; 
            font-size: 16px; 
            line-height: 1.6;
            animation: fadeInMenu 0.4s ease forwards;
        }

        @keyframes fadeInMenu {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0% { border-color: rgba(255, 0, 85, 0.3); box-shadow: inset 0 0 15px rgba(255, 0, 85, 0.1); }
            100% { border-color: rgba(255, 0, 85, 0.6); box-shadow: inset 0 0 20px rgba(255, 0, 85, 0.2), 0 0 15px rgba(255, 0, 85, 0.1); }
        }
    </style>
</head>
<body>

<div class="box">
    <h2>CHISATO SYSTEM</h2>
    <div id="content">
        <p style="color: #ff0055; font-size: 14px; letter-spacing: 1px;">Đang xác thực thiết bị...</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://apikey-b4435-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    let uid = urlParams.get('uid');
    const token = urlParams.get('token'); 
    const contentDiv = document.getElementById('content');

    // --- CƠ CHẾ LOGIC UID MỚI ---
    if (uid) {
        // Nếu truy cập có sẵn UID trên URL -> Lưu vào máy
        localStorage.setItem('chisato_device_uid', uid);
    } else {
        // Nếu truy cập không có đuôi UID -> Lôi UID trong máy ra 
        uid = localStorage.getItem('chisato_device_uid');
        if (uid) {
            // VÀ TỰ ĐỘNG GẮN ĐUÔI ?uid=... LÊN THANH URL
            window.history.replaceState(null, '', window.location.pathname + '?uid=' + uid);
        }
    }

    // NẾU CÓ TOKEN (Sau khi vượt link về) -> CHỈ XÓA TOKEN VÀ GIỮ LẠI ĐUÔI UID
    if (token && uid) {
        window.history.replaceState(null, '', window.location.pathname + '?uid=' + uid);
    }

    // --- BẮT ĐẦU CHECK ---
    if (!uid) {
        contentDiv.innerHTML = '<p class="error-msg">THIẾT BỊ CHƯA ĐĂNG KÝ<br><span style="color:#444; font-size:13px; font-weight:400;">Vui lòng mở App để nhận diện thiết bị lần đầu tiên.</span></p>';
    } else {
        processKeySystem();
    }

    async function processKeySystem() {
        const ref = db.ref('keys/' + uid);
        const snap = await ref.once('value');
        const data = snap.val();
        const now = Date.now();

        // TRƯỜNG HỢP 1: Key cũ CÒN HẠN
        if (data && data.key && data.expires_at > now) {
            renderUI(data.key, data.expires_at, "LIÊN KẾT ĐANG HOẠT ĐỘNG");
            return;
        }

        // TRƯỜNG HỢP 2: Có Token từ App gửi sang -> TẠO KEY MỚI
        if (token === "CHISATO_OK") {
            const randomStr = Math.random().toString(36).substring(2, 9).toUpperCase();
            const newKey = "CHISATO_" + randomStr;
            const expireTime = now + (3 * 24 * 60 * 60 * 1000); // 3 ngày

            await ref.set({
                key: newKey,
                expires_at: expireTime,
                status: "active"
            });

            renderUI(newKey, expireTime, "ĐÃ CẤP MÃ TRUY CẬP MỚI");
            return;
        }

        // TRƯỜNG HỢP 3: Hết hạn hoặc truy cập không có token vượt link
        if (data && data.expires_at <= now) {
            contentDiv.innerHTML = `
                <p class="error-msg" style="color: #ff9900;">BẠN ĐÃ HẾT HẠN KEY</p>
                <p style="color:#666; font-size:13px; margin-top:10px; line-height:1.5;">Vui lòng <b>vào app để get key</b>.</p>
            `;
        } else {
            contentDiv.innerHTML = `
                <p class="error-msg" style="color: #ff9900;">YÊU CẦU LẤY MÃ</p>
                <p style="color:#666; font-size:13px; margin-top:10px; line-height:1.5;">Vui lòng <b>vào lại App bấm nút để lấy mã mới.</b></p>
            `;
        }
    }

    function renderUI(key, expires_at, msg) {
        const dateObj = new Date(expires_at);
        const dateStr = dateObj.toLocaleDateString('vi-VN') + " " + dateObj.toLocaleTimeString('vi-VN');
        
        contentDiv.innerHTML = `
            <p style="color: #00ff66; font-weight: 600; font-size: 13px; letter-spacing: 1px;">${msg}</p>
            <div class="key-display">${key}</div>
            <button class="btn-copy" onclick="copyMyKey('${key}')">SAO CHÉP MÃ</button>
            <p class="warning">Mã truy cập sẽ tự động hủy vào lúc:<br><strong style="color:#aaa;">${dateStr}</strong></p>
        `;
    }

    function copyMyKey(k) {
        navigator.clipboard.writeText(k).then(() => {
            const btn = document.querySelector('.btn-copy');
            btn.innerText = "ĐÃ SAO CHÉP THÀNH CÔNG!";
            btn.style.background = "linear-gradient(90deg, #00ff66 0%, #00cc52 100%)";
            btn.style.boxShadow = "0 4px 15px rgba(0, 255, 102, 0.3)";
            setTimeout(() => { 
                btn.innerText = "SAO CHÉP MÃ"; 
                btn.style.background = "linear-gradient(90deg, #ff0055 0%, #d60048 100%)"; 
                btn.style.boxShadow = "0 4px 15px rgba(255, 0, 85, 0.3)";
            }, 2000);
        });
    }
</script>

</body>
</html>
