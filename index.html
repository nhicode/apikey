<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CHISATO KEY SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0a0a; color: #ff0055; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: #161616; padding: 30px; border-left: 5px solid #ff0055; border-radius: 10px; width: 350px; text-align: center; }
        .key-box { background: #000; padding: 15px; margin: 20px 0; font-size: 20px; color: #00ff00; border: 1px solid #333; }
    </style>
</head>
<body>
<div class="box">
    <h2>CHISATO KEY SYSTEM</h2>
    <div id="ui">Đang xác thực...</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://apikey-b4435-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const params = new URLSearchParams(window.location.search);
    const uid = params.get('uid');

    async function init() {
        if (!uid || sessionStorage.getItem('processed')) {
            document.getElementById('ui').innerHTML = "⛔ TRUY CẬP KHÔNG HỢP LỆ HOẶC ĐÃ RELOAD";
            return;
        }

        const ref = db.ref('keys/' + uid);
        const snapshot = await ref.once('value');
        const now = Date.now();

        // 1. Kiểm tra Key cũ
        if (snapshot.exists()) {
            const data = snapshot.val();
            if (now < data.expires_at) {
                showKey(data.key);
            } else {
                await ref.remove(); // Hết hạn thì xóa
                createKey(ref, now);
            }
        } else {
            createKey(ref, now);
        }
    }

    async function createKey(ref, now) {
        const newKey = "CHISATO_" + Math.random().toString(36).substr(2, 9).toUpperCase();
        const expires = now + (3 * 24 * 60 * 60 * 1000); // 3 ngày
        await ref.set({ key: newKey, created_at: now, expires_at: expires });
        sessionStorage.setItem('processed', 'true'); // Chặn reload
        showKey(newKey);
    }

    function showKey(k) {
        document.getElementById('ui').innerHTML = `<div>KEY CỦA BẠN:</div><div class="key-box">${k}</div><p style="font-size:12px">Hạn: 3 ngày</p>`;
    }

    init();
</script>
</body>
</html>
