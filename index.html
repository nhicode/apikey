<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>NHICODE KEY SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #121212; color: #00ffff; text-align: center; font-family: Arial; }
        .box { margin-top: 50px; padding: 20px; border: 1px solid #00ffff; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="keyDisplay">Đang xác thực thiết bị...</h2>
    </div>

    <script>
        const supabase = supabase.createClient('https://lkccrljfsjdahahkvjso.supabase.co', 'sb_publishable_pjKafP6hlWM_mopiF-daeA_HJXASiwk');

        async function generateKey() {
            const token = new URLSearchParams(window.location.search).get('token');
            if (!token) { document.getElementById('keyDisplay').innerText = "LỖI: THIẾU TOKEN"; return; }

            // 1. Lấy device_id từ bảng tokens_table
            const { data: tokenData } = await supabase
                .from('tokens_table')
                .select('device_id')
                .eq('token_value', token)
                .single();

            if (!tokenData) { document.getElementById('keyDisplay').innerText = "TOKEN HẾT HẠN"; return; }

            const uid = tokenData.device_id;
            const newKey = "NC-" + Math.random().toString(36).substring(2, 10).toUpperCase();

            // 2. Lưu Key với đúng UID vào keys_table
            await supabase.from('keys_table').insert([{ key_value: newKey, device_id: uid }]);
            
            // 3. Xóa token để tránh dùng lại
            await supabase.from('tokens_table').delete().eq('token_value', token);

            document.getElementById('keyDisplay').innerText = "KEY CỦA BẠN: " + newKey;
        }
        generateKey();
    </script>
</body>
</html>
